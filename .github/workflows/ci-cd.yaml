on:
  push:
    branches:
      - main

# Environment use for create variable for use in this pipeline
env:
  DOCKER_IMAGE_NAME: prod-ui # image name in docker hub
  HELM_REPO: tochratana/gitops-fullstack # repo that store template
# build docker image and push to docker hub
jobs:
  ci-jobs:
    # runs-on mean select machines for run this pipeline, normaly it have two type of this (github machines, and self hosted machines)
    runs-on: ubuntu-latest
    environment: DOCKER_ENV # setting > Environment > create environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Use with SHA
        run: |
          echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV
      - name: Show the new tags value
        run: |
          echo "Tag value is: ${{ env.TAG }}"
      # login to docker hub
      # setting > Environment(create new environment) > add screte (USERNAME, PASSWORD)
      # PASSWORD can be token from docker hub
      - name: Login to Dockerhub
        run: |
          echo "${{ secrets.PASSWORD }}" | docker login -u ${{secrets.USERNAME}} --password-stdin

      # Build docker image mean build and -t > tag already
      - name: Build Docker image and tag
        run: docker build -t ${{ secrets.USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.TAG }} .
      - name: Push to Docker hub
        run: docker push ${{ secrets.USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.TAG }}
      - name: Logout from Dockerhub
        if: always()
        run: |
          docker logout
  # update helm repo with new imagejobs:
  cd-jobs:
    needs: ci-jobs
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.HELM_ENV || 'dev' }} # optional protected env
    steps:
      # make repo metadata available
      - uses: actions/checkout@v3

      - name: Install yq command
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Add commit SHA to TAG env
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Clone Helm repository
        env:
          HELM_REPO: ${{ env.HELM_REPO }}
        run: |
          git clone "https://github.com/${HELM_REPO}.git" helm_repo

      - name: Update Helm chart
        working-directory: helm_repo # cd into the cloned repo
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          TAG: ${{ env.TAG }}
          DOCKER_IMAGE_NAME: ${{ env.DOCKER_IMAGE_NAME }}
        run: |
          echo "Updating repository/imagename…"
          yq -i ".image.repository=\"${DOCKER_USERNAME}/${DOCKER_IMAGE_NAME}\"" values.yaml
          yq -i ".image.tag=\"${TAG}\""                                  values.yaml

          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add values.yaml
          git commit -m "Update helm to use image ${TAG}" || true  # no-op if nothing changed
          git push "https://${GIT_TOKEN}@github.com/${HELM_REPO}.git" HEAD:main

      - name: Clean up
        run: rm -rf helm_repo
